spring:
  application:
    name: kafka-order-processing

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: order-processing-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.example.kafkaorders.dto
        spring.json.value.default.type: com.example.kafkaorders.dto.OrderCreatedEvent

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/orders_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false

app:
  kafka:
    topics:
      orders-created: orders.created
      orders-processed: orders.processed
      orders-failed: orders.failed

logging:
  level:
    root: INFO
    com.example.kafkaorders: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

